name: Release and Docker Publish

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Tests
        uses: docker://golang:1.26-bookworm
        with:
          args: go test -v ./internal/...

      - name: Log in to Gitea Container Registry
        uses: docker://docker:cli
        volumes:
          - /var/run/docker.sock:/var/run/docker.sock
        with:
          entrypoint: /bin/sh
          args: >-
            -c "
            REGISTRY_HOST=\$(echo \"${{ gitea.server_url }}\" | sed -e 's|^[^/]*//||' -e 's|:3000||') &&
            echo \"Logging into clean registry host: \${REGISTRY_HOST}\" &&
            echo '${{ secrets.GITEA_TOKEN }}' | docker login \${REGISTRY_HOST} --username ${{ gitea.actor }} --password-stdin
            "

      - name: Build and Push Docker Image
        uses: docker://docker:cli
        volumes:
          - /var/run/docker.sock:/var/run/docker.sock
        with:
          entrypoint: /bin/sh
          args: >-
            -c "
            VERSION_TAG=\"${GITHUB_REF#refs/tags/}\" &&
            REGISTRY_HOST=\$(echo \"${{ gitea.server_url }}\" | sed -e 's|^[^/]*//||' -e 's|:3000||') &&
            IMAGE_PATH=\"\${REGISTRY_HOST}/${{ gitea.repository }}\" &&
            IMAGE_PATH=\$(echo \"\$IMAGE_PATH\" | tr '[:upper:]' '[:lower:]') &&
            echo \"Building image for version: \${VERSION_TAG} at path \${IMAGE_PATH}\" &&
            docker build -t \"\${IMAGE_PATH}:\${VERSION_TAG}\" -t \"\${IMAGE_PATH}:latest\" . &&
            docker push \"\${IMAGE_PATH}:\${VERSION_TAG}\" &&
            docker push \"\${IMAGE_PATH}:latest\"
            "

      - name: Create Gitea Release
        run: |
          VERSION_TAG="${GITHUB_REF#refs/tags/}"
          
          # Call Gitea's native built-in API endpoint directly to cut a release and generate notes
          curl -X POST "${{ gitea.server_url }}/api/v1/repos/${{ gitea.repository }}/releases" \
            -H "Authorization: token ${{ secrets.GITEA_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"tag_name\": \"${VERSION_TAG}\",
              \"target_commitish\": \"${{ gitea.sha }}\",
              \"name\": \"${VERSION_TAG}\",
              \"body\": \"Automated release generated by Gitea Actions.\",
              \"draft\": false,
              \"prerelease\": false
            }"
