name: Code Verification and Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'

jobs:
  test-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Tests
        uses: docker://golang:1.26-bookworm
        with:
          args: go test -v ./internal/...

      - name: Create Gitea Release
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          VERSION_TAG="${GITHUB_REF#refs/tags/}"
          
          curl -X POST "${{ gitea.server_url }}/api/v1/repos/${{ gitea.repository }}/releases" \
            -H "Authorization: token ${{ secrets.GITEA_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"tag_name\": \"${VERSION_TAG}\",
              \"target_commitish\": \"${{ gitea.sha }}\",
              \"name\": \"${VERSION_TAG}\",
              \"body\": \"Automated release generated by Gitea Actions.\",
              \"draft\": false,
              \"prerelease\": false
            }"
