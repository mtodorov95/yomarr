name: Release and Docker Publish

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    options: >-
      -v /var/run/docker.sock:/var/run/docker.sock
      -v /usr/bin/docker:/usr/bin/docker

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Tests
        uses: docker://golang:1.26-bookworm
        with:
          args: go test -v ./internal/...

      - name: Log in to Gitea Container Registry
        run: |
          echo "${{ secrets.GITEA_TOKEN }}" | docker login ${{ gitea.server_url }} --username ${{ gitea.actor }} --password-stdin

      - name: Build and Push Docker Image
        run: |
          # Strip 'refs/tags/' from the ref string to get clean tags like 'v0.3.0'
          VERSION_TAG="${GITHUB_REF#refs/tags/}"
          IMAGE_PATH="${{ gitea.server_url }}/${{ gitea.repository }}"
          
          echo "Building image for version: ${VERSION_TAG}"
          
          # Build the container locally
          docker build \
            -t "${IMAGE_PATH}:${VERSION_TAG}" \
            -t "${IMAGE_PATH}:latest" \
            .
            
          # Push both your specific version tag and 'latest' to your registry
          docker push "${IMAGE_PATH}:${VERSION_TAG}"
          docker push "${IMAGE_PATH}:latest"

      - name: Create Gitea Release
        run: |
          VERSION_TAG="${GITHUB_REF#refs/tags/}"
          
          # Call Gitea's native built-in API endpoint directly to cut a release and generate notes
          curl -X POST "${{ gitea.server_url }}/api/v1/repos/${{ gitea.repository }}/releases" \
            -H "Authorization: token ${{ secrets.GITEA_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"tag_name\": \"${VERSION_TAG}\",
              \"target_commitish\": \"${{ gitea.sha }}\",
              \"name\": \"${VERSION_TAG}\",
              \"body\": \"Automated release generated by Gitea Actions.\",
              \"draft\": false,
              \"prerelease\": false
            }"
